<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>墨韵手写下单系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(180deg, #f2f4f8 0%, #f8fafc 100%); color: #1f2937; }
    .glass { background: rgba(255,255,255,.84); backdrop-filter: blur(8px); border: 1px solid rgba(148,163,184,.25); border-radius: 16px; box-shadow: 0 10px 28px rgba(15,23,42,.08); }
    .container-main { max-width: 980px; }
    .top-ai { position: sticky; top: 12px; z-index: 99; }
    .price-chip { border-radius: 999px; background: #eef2ff; color: #3730a3; padding: 6px 12px; font-size: 13px; }
    textarea { min-height: 220px; }
    .muted { color: #6b7280; font-size: 14px; }
  </style>
</head>
<body>
<div class="container container-main py-4">
  <div class="glass p-4 mb-4 top-ai">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
      <div>
        <h5 class="mb-1">AI 写稿助手（顶部悬浮）</h5>
        <div class="muted">输入主题即可快速生成可修改文稿（支持免费模式）。</div>
      </div>
      <div class="d-flex gap-2 flex-grow-1" style="max-width:560px;">
        <input id="aiPrompt" class="form-control" placeholder="例如：一段送老师的古风感谢词，约300字">
        <button id="aiGenerateBtn" class="btn btn-dark">生成</button>
      </div>
    </div>
    <div id="aiResultWrap" class="mt-3 d-none">
      <label class="form-label">AI 结果</label>
      <textarea id="aiResult" class="form-control" rows="5"></textarea>
      <div class="mt-2 text-end">
        <button id="useAiTextBtn" class="btn btn-outline-primary btn-sm">填入下方订单文本</button>
      </div>
    </div>
  </div>

  <div class="glass p-4">
    <div class="d-flex justify-content-between flex-wrap gap-2 align-items-center mb-3">
      <h4 class="mb-0">书法抄写下单</h4>
      <a href="/admin/orders" class="btn btn-outline-secondary btn-sm">查看后台订单</a>
    </div>

    <div class="d-flex flex-wrap gap-2 mb-3">
      <span class="price-chip">抄写费：250字=1元</span>
      <span class="price-chip">纸费（非A4）：3000字=1元</span>
      <span class="price-chip">纸费（A4）：1000字=1元</span>
      <span class="price-chip">宋楷体附加：1000字+2元</span>
      <span class="price-chip">24小时急单：总价×2.5</span>
    </div>

    <form id="orderForm" enctype="multipart/form-data">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">下单昵称</label>
          <input class="form-control" name="nickname" required maxlength="64" placeholder="请输入客户昵称">
        </div>
        <div class="col-md-3">
          <label class="form-label">纸张类型</label>
          <select class="form-select" name="paper_type" id="paperType">
            <option value="non_a4">非A4纸</option>
            <option value="a4">A4打印纸</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">字体</label>
          <select class="form-select" name="font_type" id="fontType">
            <option value="楷宋体">楷宋体</option>
            <option value="行草体">行草体</option>
            <option value="宋楷体">宋楷体（加价）</option>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label">文本内容（支持直接输入）</label>
          <textarea class="form-control" name="content" id="content" maxlength="30000" placeholder="可直接粘贴文本，最多3万字"></textarea>
        </div>

        <div class="col-md-8">
          <label class="form-label">或上传文件（.txt / .docx）</label>
          <input class="form-control" type="file" name="upload_file" id="uploadFile" accept=".txt,.docx">
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" id="urgent" name="urgent" value="true">
            <label class="form-check-label" for="urgent">24小时急单（2.5倍）</label>
          </div>
        </div>
      </div>

      <div class="mt-3 d-flex gap-2">
        <button type="button" id="calcBtn" class="btn btn-outline-dark">计算金额</button>
        <button type="submit" class="btn btn-primary">提交订单</button>
      </div>
    </form>

    <div id="calcResult" class="alert alert-light border mt-3 d-none"></div>
    <div id="submitResult" class="alert mt-3 d-none"></div>
    <div class="muted mt-2">客服微信：<b>zh3110241437</b> / <b>XCS1949749</b></div>
  </div>
</div>

<script>
  const aiPrompt = document.getElementById('aiPrompt');
  const aiGenerateBtn = document.getElementById('aiGenerateBtn');
  const aiResultWrap = document.getElementById('aiResultWrap');
  const aiResult = document.getElementById('aiResult');
  const useAiTextBtn = document.getElementById('useAiTextBtn');
  const contentInput = document.getElementById('content');
  const calcBtn = document.getElementById('calcBtn');
  const calcResult = document.getElementById('calcResult');
  const submitResult = document.getElementById('submitResult');
  const orderForm = document.getElementById('orderForm');

  aiGenerateBtn.addEventListener('click', async () => {
    const prompt = aiPrompt.value.trim();
    if (!prompt) return alert('请先输入AI主题');
    aiGenerateBtn.disabled = true;
    aiGenerateBtn.textContent = '生成中...';
    try {
      const res = await fetch('/api/ai/generate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      if (data.code !== 0) throw new Error(data.errorMsg || 'AI生成失败');
      aiResult.value = data.data.text || '';
      aiResultWrap.classList.remove('d-none');
    } catch (e) {
      alert(e.message);
    } finally {
      aiGenerateBtn.disabled = false;
      aiGenerateBtn.textContent = '生成';
    }
  });

  useAiTextBtn.addEventListener('click', () => {
    contentInput.value = aiResult.value;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  });

  calcBtn.addEventListener('click', async () => {
    const payload = {
      content: contentInput.value,
      paper_type: document.getElementById('paperType').value,
      font_type: document.getElementById('fontType').value,
      urgent: document.getElementById('urgent').checked
    };
    try {
      const res = await fetch('/api/orders/calc', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.code !== 0) throw new Error(data.errorMsg || '计算失败');
      const d = data.data;
      calcResult.className = 'alert alert-light border mt-3';
      calcResult.classList.remove('d-none');
      calcResult.innerHTML = `字数：${d.char_count}；抄写费：¥${d.write_fee}；纸费：¥${d.paper_fee}；字体附加：¥${d.font_fee}；小计：¥${d.subtotal}；总价：<b>¥${d.total}</b>`;
    } catch (e) {
      calcResult.className = 'alert alert-danger mt-3';
      calcResult.classList.remove('d-none');
      calcResult.textContent = e.message;
    }
  });

  orderForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    submitResult.classList.add('d-none');

    const formData = new FormData(orderForm);
    formData.set('urgent', document.getElementById('urgent').checked ? 'true' : 'false');
    formData.set('ai_generated', aiResult.value.trim() ? 'true' : 'false');

    try {
      const res = await fetch('/api/orders', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.code !== 0) throw new Error(data.errorMsg || '提交失败');
      submitResult.className = 'alert alert-success mt-3';
      submitResult.classList.remove('d-none');
      submitResult.innerHTML = `
        下单成功，订单号 #${data.data.order_id}。<br>
        总价格预估值：<b>¥${data.data.amount}</b>（共 ${data.data.char_count} 字）。<br>
        请添加微信联系确认：<b>zh3110241437</b> / <b>XCS1949749</b>
      `;
      orderForm.reset();
    } catch (e) {
      submitResult.className = 'alert alert-danger mt-3';
      submitResult.classList.remove('d-none');
      submitResult.textContent = e.message;
    }
  });
</script>
</body>
</html>
